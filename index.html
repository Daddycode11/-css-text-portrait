<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>My Portrait</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%;
        height: 100%;
        background: #000;
        font-family: "Courier New", monospace;
        overflow-x: hidden;
      }

      /* ── Upload Screen ── */
      #upload-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100vw;
        height: 100vh;
        gap: 20px;
        padding: 20px;
      }

      #upload-screen h1 {
        color: #333;
        font-size: 11px;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        font-weight: normal;
      }

      label.upload-btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 14px 32px;
        border: 1px solid #2a2a2a;
        border-radius: 4px;
        color: #666;
        font-size: 13px;
        letter-spacing: 0.12em;
        cursor: pointer;
        text-transform: uppercase;
        transition: border-color 0.2s, color 0.2s;
        -webkit-tap-highlight-color: transparent;
      }
      label.upload-btn:active { border-color: #555; color: #ccc; }
      label.upload-btn input  { display: none; }

      /* ── Portrait Screen ── */
      #portrait-screen {
        display: none;
        width: 100vw;
        overflow: hidden;
      }

      #portrait {
        display: block;
        /* Critical: exact viewport width, no overflow */
        width: 100vw;
        max-width: 100vw;
        overflow: hidden;
        min-height: calc(100vh - 70px);
        background-size: cover;
        background-position: center top;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        font-weight: bold;
        word-break: break-all;
        word-spacing: 0px;
        line-height: 1.0;
        /* font-size & letter-spacing set dynamically by JS */
      }

      /* ── Controls Bar ── */
      #controls {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        height: 70px;
        background: rgba(0, 0, 0, 0.92);
        border-top: 1px solid #1a1a1a;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 12px;
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        z-index: 999;
      }
      #controls::-webkit-scrollbar { display: none; }

      .ctrl {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 90px;
        flex-shrink: 0;
      }
      .ctrl span {
        font-size: 9px;
        color: #555;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .ctrl span b { color: #888; }

      input[type=range] {
        width: 100%;
        accent-color: #fff;
        cursor: pointer;
        -webkit-appearance: none;
        height: 2px;
        background: #333;
        border-radius: 2px;
        outline: none;
      }
      input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 16px; height: 16px;
        background: #fff;
        border-radius: 50%;
        cursor: pointer;
      }
      input[type=range]::-moz-range-thumb {
        width: 16px; height: 16px;
        background: #fff;
        border-radius: 50%;
        cursor: pointer;
        border: none;
      }

      .ctrl-check {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        font-size: 9px;
        color: #555;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        flex-shrink: 0;
        -webkit-tap-highlight-color: transparent;
      }
      .ctrl-check input {
        width: 16px; height: 16px;
        accent-color: #fff;
        cursor: pointer;
      }

      label.change-btn {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 6px 12px;
        border: 1px solid #222;
        border-radius: 4px;
        color: #555;
        font-size: 9px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        flex-shrink: 0;
        margin-left: auto;
        transition: border-color 0.2s, color 0.2s;
        -webkit-tap-highlight-color: transparent;
        white-space: nowrap;
      }
      label.change-btn:active { border-color: #555; color: #ccc; }
      label.change-btn input  { display: none; }
    </style>
  </head>
  <body>

    <!-- Upload Screen -->
    <div id="upload-screen">
      <h1>✦ CSS Text Portrait</h1>
      <label class="upload-btn">
        📷 Upload Photo
        <input type="file" id="imgInput" accept="image/*" />
      </label>
    </div>

    <!-- Portrait Screen -->
    <div id="portrait-screen">
      <p id="portrait"></p>

      <div id="controls">
        <div class="ctrl">
          <span>Brightness <b id="bVal">1.4</b></span>
          <input type="range" id="brightness" min="0.5" max="4" step="0.1" value="1.4" />
        </div>
        <div class="ctrl">
          <span>Contrast <b id="cVal">2.0</b></span>
          <input type="range" id="contrast" min="0.5" max="5" step="0.1" value="2.0" />
        </div>
        <div class="ctrl">
          <span>Font <b id="fVal"></b>px</span>
          <input type="range" id="fontSize" min="3" max="14" step="0.5" value="7" />
        </div>
        <label class="ctrl-check">
          <input type="checkbox" id="invertToggle" />
          Invert
        </label>
        <label class="ctrl-check">
          <input type="checkbox" id="grayscaleToggle" checked />
          Gray
        </label>
        <label class="change-btn">
          📷 Change
          <input type="file" id="swapInput" accept="image/*" />
        </label>
      </div>
    </div>

    <script>
      const LYRICS = `Lights go down and the night is calling to me yeah I hear voices singing songs in the street And I know that we won't be going home for so long for so long But I know that I won't be on my own yeah I love this feeling and Right now I wish you were here with me Oh-ooh Cause right now Everything is new to me Oh-ooh You know I can't fight the feeling And every night I feel it Right now I wish you were here with me Oh-ooh Late night spaces With all our friends you and me yeah Love these faces Just like how it used to be And we won't be going home For so long for so long But I know I won't be on my own On my own I'm feeling like Right now I wish you were here with me Oh-ooh Cause right now Everything is new to me Oh-ooh You know I can't fight the feeling And every night I feel it Right now I wish you were here with me Oh-ooh And I could do this forever Woah-oh-oh woah-oh-oh And let's go crazy together Woah-oh-oh woah-oh-oh Lights go down and the night is calling to me yeah I hear voices singing songs in the street And I know that we won't be going home for so long for so long But I know that I won't be on my own yeah I love this feeling and Right now I wish you were here with me Oh-ooh Cause right now Everything is new to me Oh-ooh You know I can't fight the feeling And every night I feel it Right now I wish you were here with me Oh-ooh Late night spaces With all our friends you and me yeah Love these faces Just like how it used to be And we won't be going home For so long for so long But I know I won't be on my own On my own I'm feeling like Right now I wish you were here with me Oh-ooh Cause right now Everything is new to me Oh-ooh You know I can't fight the feeling And every night I feel it Right now I wish you were here with me Oh-ooh And I could do this forever Woah-oh-oh woah-oh-oh And let's go crazy together Woah-oh-oh woah-oh-oh Lights go down and the night is calling to me yeah I hear voices singing songs in the street And I know that we won't be going home for so long for so long But I know that I won't be on my own yeah I love this feeling and Right now I wish you were here with me Oh-ooh Cause right now Everything is new to me Oh-ooh You know I can't fight the feeling And every night I feel it Right now I wish you were here with me Oh-ooh Late night spaces With all our friends you and me yeah Love these faces Just like how it used to be And we won't be going home For so long for so long But I know I won't be on my own On my own I'm feeling like Right now I wish you were here with me Oh-ooh Cause right now Everything is new to me Oh-ooh You know I can't fight the feeling And every night I feel it Right now I wish you were here with me Oh-ooh And I could do this forever Woah-oh-oh woah-oh-oh And let's go crazy together Woah-oh-oh woah-oh-oh`;

      const portrait         = document.getElementById('portrait');
      const uploadScreen     = document.getElementById('upload-screen');
      const portraitScreen   = document.getElementById('portrait-screen');
      const brightnessSlider = document.getElementById('brightness');
      const contrastSlider   = document.getElementById('contrast');
      const fontSizeSlider   = document.getElementById('fontSize');
      const invertToggle     = document.getElementById('invertToggle');
      const grayscaleToggle  = document.getElementById('grayscaleToggle');

      /* Calculate optimal font size based on screen width */
      function getAutoFontSize() {
        const w = window.innerWidth;
        if (w <= 320) return 4.0;
        if (w <= 375) return 4.5;
        if (w <= 480) return 5.0;
        if (w <= 600) return 5.5;
        if (w <= 768) return 6.0;
        if (w <= 1024) return 7.0;
        return 8.0;
      }

      /* Calculate letter-spacing — keep tight on mobile to avoid overflow */
      function getLetterSpacing(fs) {
        const w = window.innerWidth;
        if (w <= 480) return (fs * 0.08) + 'px';
        if (w <= 768) return (fs * 0.15) + 'px';
        return (fs * 0.22) + 'px';
      }

      function buildText() {
        const words = LYRICS.trim().split(/\s+/);
        let t = '', i = 0;
        while (t.length < 20000) { t += words[i % words.length] + ' '; i++; }
        return t;
      }

      function applyFilter() {
        const b  = brightnessSlider.value;
        const c  = contrastSlider.value;
        const gs = grayscaleToggle.checked ? 'grayscale(1) ' : '';
        const iv = invertToggle.checked    ? 'invert(1) '    : '';
        portrait.style.filter = `${gs}${iv}contrast(${c}) brightness(${b})`;
        document.getElementById('bVal').textContent = b;
        document.getElementById('cVal').textContent = c;
      }

      function applyFontSize() {
        const fs = parseFloat(fontSizeSlider.value);
        portrait.style.fontSize      = fs + 'px';
        portrait.style.letterSpacing = getLetterSpacing(fs);
        portrait.style.lineHeight    = fs <= 5 ? '0.98' : '1.0';
        document.getElementById('fVal').textContent = fs;
      }

      function loadImage(src) {
        portrait.textContent = buildText();
        portrait.style.backgroundImage = `url('${src}')`;
        const autoFs = getAutoFontSize();
        fontSizeSlider.value = autoFs;
        applyFontSize();
        applyFilter();
        uploadScreen.style.display   = 'none';
        portraitScreen.style.display = 'block';
      }

      function handleFile(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => loadImage(e.target.result);
        reader.readAsDataURL(file);
      }

      document.getElementById('imgInput').addEventListener('change',  e => handleFile(e.target.files[0]));
      document.getElementById('swapInput').addEventListener('change', e => handleFile(e.target.files[0]));
      brightnessSlider.addEventListener('input', applyFilter);
      contrastSlider.addEventListener('input',   applyFilter);
      fontSizeSlider.addEventListener('input',   applyFontSize);
      invertToggle.addEventListener('change',    applyFilter);
      grayscaleToggle.addEventListener('change', applyFilter);

      window.addEventListener('resize', () => {
        if (portraitScreen.style.display === 'block') {
          fontSizeSlider.value = getAutoFontSize();
          applyFontSize();
        }
      });
    </script>

  </body>
</html>
